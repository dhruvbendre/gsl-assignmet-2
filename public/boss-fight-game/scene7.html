<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Fight - Part 2 (Flipped)</title>
    <link rel="stylesheet" href="src/css/scene7.css">
    <link rel="stylesheet" href="src/css/game-ui.css">
    <script src="js/game.js" defer></script>
</head>
<body>
    <img src="src/img/Gemini_Generated_Image_szh8u0szh8u0szh8.png">
    
    <div class="game-container">
        
        <img class="boss-avatar" src="src/icons/ChatGPT Image Jun 28, 2026, 10_25_27 AM.png">
        
        <div class="scene fade-in" id="s10">
            <div class="scene-title">Boss Questions</div>
            <div class="quiz-container">
              
                <div class="quiz-q">
                    <div class="q-text">3. Which pin carries information?</div>
                    <div class="quiz-options">
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">A GND</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">B VCC</span></button>
                        <button class="quiz-opt" data-answer="correct"><span class="opt-text">C A0</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">D USB</span></button>
                    </div>
                </div>
              
                <div class="quiz-q">
                    <div class="q-text">4. Dry soil means...</div>
                    <div class="quiz-options">
                        <button class="quiz-opt" data-answer="correct"><span class="opt-text">A Add Water</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">B Remove Plant</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">C Stop Arduino</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">D Dance</span></button>
                    </div>
                </div>
              
            </div>
            <div class="feedback-msg" id="fb10"></div>
        </div>

    </div>
</body>
</html>
