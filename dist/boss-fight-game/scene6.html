<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Fight</title>
    <link rel="stylesheet" href="src/css/common2.css">
    <link rel="stylesheet" href="src/css/game-ui.css">
    <link rel="stylesheet" href="src/css/cinematic-boss.css">
    <script src="js/game.js" defer></script>
</head>
<body>
    <img src="src/img/Gemini_Generated_Image_szh8u0szh8u0szh8.png">
    
    <div class="game-container">
        
        <img class="boss-avatar" src="src/icons/ChatGPT Image Jun 28, 2026, 10_32_52 AM.png">
        
        <div class="scene fade-in" id="s9">
            <div class="scene-title">Mission Final</div>
            <div class="quiz-container">
              
                <div class="quiz-q">
                    <div class="q-text">Repair the lab brain: which part controls the whole smart garden?</div>
                    <div class="quiz-options">
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">A LED</span></button>
                        <button class="quiz-opt" data-answer="correct"><span class="opt-text">B Arduino</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">C Battery</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">D Wire</span></button>
                    </div>
                </div>
              
                <div class="quiz-q">
                    <div class="q-text">Sprouty is thirsty. What does the soil moisture sensor measure?</div>
                    <div class="quiz-options">
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">A Temperature</span></button>
                        <button class="quiz-opt" data-answer="correct"><span class="opt-text">B Water in Soil</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">C Wind</span></button>
                        <button class="quiz-opt" data-answer="wrong"><span class="opt-text">D Light</span></button>
                    </div>
                </div>
              
            </div>
            <div class="feedback-msg" id="fb9"></div>
        </div>

    </div>
</body>
</html>
